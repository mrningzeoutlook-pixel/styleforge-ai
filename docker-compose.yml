version: "3.8"

services:
  styleforge-api:
    build: .
    container_name: styleforge-api
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./temp:/app/temp
      - ./logs:/app/logs
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - styleforge-net

  nginx:
    image: nginx:alpine
    container_name: styleforge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./output:/var/www/output:ro
    depends_on:
      - styleforge-api
    restart: unless-stopped
    networks:
      - styleforge-net

  redis:
    image: redis:alpine
    container_name: styleforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - styleforge-net

  worker:
    build: .
    container_name: styleforge-worker
    command: python -m src.workers.video_worker
    volumes:
      - ./output:/app/output
      - ./temp:/app/temp
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - styleforge-net

volumes:
  redis_data:

networks:
  styleforge-net:
    driver: bridge
